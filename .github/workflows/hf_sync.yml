name: Sync to Hugging Face Space

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    if: github.actor != 'hf-sync-bot' && !contains(github.event.head_commit.message, 'Sync:')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git remote add hf https://thrdchld:$HF_TOKEN@huggingface.co/spaces/thrdchld/ghostwaiter
          git push --force hf main